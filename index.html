<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bartosz Rogala Welyo | ElevenLabs Widget</title>
  <meta name="description" content="Strona demonstracyjna z widgetem ElevenLabs ConvAI." />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      text-align: center;
      padding: 48px 28px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(36px, 7vw, 68px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 auto 32px;
      max-width: 520px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.14);
      color: #e0f2fe;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .widget-note {
      margin-top: 28px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">ElevenLabs ConvAI</div>
    <h1>Bartosz Rogala Welyo</h1>
    <p>Strona demonstracyjna do prezentacji widgetu ElevenLabs.</p>

    <elevenlabs-convai
      agent-id="agent_1101kt0zw4azf8etjt5zy5vbc1yg"
      server-location="eu-residency">
    </elevenlabs-convai>

    <div class="widget-note">Widget powinien pojawić się po załadowaniu skryptu ElevenLabs.</div>
  </main>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
